<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — Gilded</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blush: #F9DBBD; --rose: #FFA5AB; --mauve: #DA627D; --wine: #A53860;
      --deep: #450920; --white: #fff; --off: #FDF7F2; --gold: #C5A059;
      --ivory: #F8F9FA; --dark: #121212; --sand: #E8D5C0; --warm-grey: #f0ebe5;
      --text-dark: #1a1410; --text-mid: #5c4a3a; --text-light: #9a8070;
      --border: rgba(197,160,89,0.25); --border-strong: rgba(197,160,89,0.5);
      --shadow-sm: 0 2px 12px rgba(69,9,32,0.07);
      --shadow-md: 0 8px 40px rgba(69,9,32,0.12);
      --muted: #9a8070;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--warm-grey);
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -5%, rgba(197,160,89,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 95% 95%, rgba(218,98,125,0.05) 0%, transparent 60%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      height: 58px;
      padding: 0 24px;
      background: var(--off);
      border-bottom: 1px solid var(--border);
    }

    .back-link {
      position: absolute;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--wine);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, gap 0.2s;
    }
    .back-link:hover { color: var(--deep); gap: 10px; }
    .back-link svg { transition: transform 0.2s; }
    .back-link:hover svg { transform: translateX(-2px); }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 400;
      letter-spacing: 0.1em;
      color: var(--text-dark);
    }

    /* PAGE */
    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* ORDER CARD */
    .order-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
    }
    .order-card:nth-child(2) { animation-delay: 0.06s; }
    .order-card:nth-child(3) { animation-delay: 0.12s; }
    .order-card:nth-child(n+4) { animation-delay: 0.18s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* CARD HEADER */
    .order-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 22px 28px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--ivory);
    }

    .header-left { display: flex; flex-direction: column; gap: 3px; }

    .booking-number {
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .delivery-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-dark);
      letter-spacing: 0.03em;
    }
    .delivery-date em { color: var(--wine); font-style: italic; }

    .track-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      width: fit-content;
      padding: 8px 18px;
      border: 1px solid rgba(165,56,96,0.35);
      border-radius: 3px;
      background: transparent;
      color: var(--wine);
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.22s;
    }
    .track-btn:hover {
      background: rgba(165,56,96,0.05);
      border-color: var(--wine);
      transform: translateY(-1px);
    }

    /* STATUS */
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .status-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .badge-processing { background: #fff8e1; color: #a57900; border: 1px solid rgba(197,160,89,0.35); }
    .badge-processing .status-dot { background: #d4a017; animation: pulse-gold 2s ease-in-out infinite; }
    .badge-shipped    { background: #e3f2fd; color: #1565c0; border: 1px solid rgba(21,101,192,0.2); }
    .badge-shipped    .status-dot { background: #1976d2; animation: pulse-blue 2s ease-in-out infinite; }
    .badge-delivered  { background: #e6f4ec; color: #2e7d32; border: 1px solid rgba(46,125,50,0.2); }
    .badge-delivered  .status-dot { background: #388e3c; }

    @keyframes pulse-gold {
      0%,100% { box-shadow: 0 0 0 3px rgba(212,160,23,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(212,160,23,0.05); }
    }
    @keyframes pulse-blue {
      0%,100% { box-shadow: 0 0 0 3px rgba(25,118,210,0.15); }
      50%      { box-shadow: 0 0 0 6px rgba(25,118,210,0.05); }
    }

    /* Timeline */
    .status-timeline { display: flex; align-items: center; margin-top: 8px; }
    .tl-step { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .tl-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--wine); }
    .tl-dot.inactive { background: transparent; border: 1px solid rgba(197,160,89,0.4); }
    .tl-line { width: 26px; height: 1px; background: linear-gradient(90deg, var(--wine), rgba(197,160,89,0.35)); margin-bottom: 4px; }
    .tl-line.inactive { background: rgba(197,160,89,0.2); }
    .tl-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .tl-label.active { color: var(--wine); font-weight: 500; }

    /* ITEMS LIST */
    .order-items {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .order-item {
      display: grid;
      grid-template-columns: 190px 1fr;
      position: relative;
      background: var(--off);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      transition: box-shadow 0.22s, transform 0.22s, border-color 0.22s;
    }
    .order-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--blush), var(--mauve));
      opacity: 0.75;
    }
    .order-item:hover {
      box-shadow: 0 5px 22px rgba(69,9,32,0.09);
      border-color: rgba(197,160,89,0.4);
      transform: translateY(-2px);
    }

    .order-item-img {
      width: 190px;
      min-height: 190px;
      align-self: stretch;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
    }
    .order-item-media {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(197,160,89,0.28);
      border-radius: 2px;
      background: linear-gradient(135deg, rgba(249,219,189,0.65) 0%, rgba(255,255,255,0.78) 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.45);
    }
    .order-item-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-placeholder { color: rgba(197,160,89,0.5); }

    .order-item-body {
      padding: 22px 24px 20px 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .order-item-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 500;
      color: var(--text-dark);
      line-height: 1.2;
    }

    .order-item-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-qty { font-size: 12px; letter-spacing: 0.1em; color: var(--text-mid); }
    .meta-qty strong { color: var(--text-dark); font-weight: 500; }

    .meta-total {
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--text-mid);
    }
    .meta-total strong { color: var(--text-dark); font-weight: 500; }

    .meta-dot-sep {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.6; flex-shrink: 0;
    }

    .delivery-pill {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--wine);
      background: rgba(165,56,96,0.07);
      border: 1px solid rgba(165,56,96,0.18);
      border-radius: 20px;
      padding: 3px 10px;
    }

    .order-item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .btn-cart, .btn-buy {
      padding: 8px 20px;
      border-radius: 3px;
      font-family: 'Jost', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-cart {
      border: 1px solid rgba(165,56,96,0.35);
      background: transparent;
      color: var(--wine);
    }
    .btn-cart:hover { background: rgba(165,56,96,0.05); border-color: var(--wine); }
    .btn-buy {
      border: none;
      background: linear-gradient(135deg, var(--mauve), var(--wine));
      color: #fff;
      box-shadow: 0 3px 12px rgba(165,56,96,0.22);
    }
    .btn-buy:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(165,56,96,0.34); }

    /* CARD FOOTER */
    .order-card-footer {
      padding: 13px 28px;
      background: var(--ivory);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .footer-left {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-delivery-info { font-size: 12.5px; color: var(--text-mid); }
    .footer-sep {
      width: 1px; height: 14px;
      background: var(--border-strong);
      flex-shrink: 0;
    }
    .footer-total {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 500;
      color: var(--text-dark);
    }
    .footer-total span { color: var(--wine); }

    .ornament {
      text-align: center;
      padding: 6px 28px 14px;
      color: rgba(197,160,89,0.35);
      font-size: 14px;
      letter-spacing: 0.3em;
    }

    /* EMPTY */
    .orders-empty { text-align: center; padding: 80px 20px; color: var(--text-light); }
    .orders-empty p { font-size: 15px; margin-bottom: 8px; }
    .orders-empty a { color: var(--mauve); text-decoration: none; font-weight: 500; font-size: 13px; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--deep); color: #fff;
      padding: 12px 28px;
      border-radius: 3px;
      font-size: 13px; letter-spacing: 0.06em;
      opacity: 0; transition: all 0.3s;
      pointer-events: none; z-index: 9999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .page-wrap { padding: 24px 14px 60px; }
      .order-card-header { padding: 16px 18px 14px; }
      .header-right { align-items: flex-start; }
      .status-timeline { display: none; }
      .order-items { padding: 14px; gap: 12px; }
      .order-item { grid-template-columns: 124px 1fr; }
      .order-item-img { width: 124px; min-height: 124px; padding: 14px; }
      .order-item-body { padding: 14px 14px 14px 4px; }
      .order-item-name { font-size: 17px; }
      .order-card-footer { padding: 12px 18px; }
      .footer-total { font-size: 16px; }
    }
    @media (max-width: 400px) {
      .order-item { grid-template-columns: 92px 1fr; }
      .order-item-img { width: 92px; min-height: 92px; padding: 10px; }
      .btn-cart, .btn-buy { font-size: 9px; padding: 7px 14px; }
    }
  </style>
</head>
<body>

  <header class="top-bar">
    <a class="back-link" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>
    <div class="page-title">Orders</div>
  </header>

  <div class="page-wrap">
    <div id="ordersList"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const ORDERS_KEY  = 'gilded_orders';
    const COUNTER_KEY = 'gilded_order_counter';

    /* ── helpers ── */
    function getOrders() {
      try { return JSON.parse(localStorage.getItem(ORDERS_KEY)) || []; }
      catch { return []; }
    }

    function fmt(n) {
      const safe = Number.isFinite(Number(n)) ? Number(n) : 0;
      return '₱ ' + safe.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function badgeClass(s) {
      const v = (s || '').toLowerCase();
      if (v === 'shipped')   return 'badge-shipped';
      if (v === 'delivered') return 'badge-delivered';
      return 'badge-processing';
    }

    function badgeLabel(s) {
      const v = (s || '').toLowerCase();
      if (v === 'shipped')   return 'In Transit';
      if (v === 'delivered') return 'Delivered';
      return 'Processing';
    }

    function timelineHTML(status) {
      const v = (status || '').toLowerCase();
      const steps = ['Placed','Packed','Shipped','Delivered'];
      const activeCount = v === 'delivered' ? 4 : v === 'shipped' ? 3 : 2;
      let html = '';
      steps.forEach((step, i) => {
        const active = i < activeCount;
        if (i > 0) html += `<div class="tl-line ${active ? '' : 'inactive'}"></div>`;
        html += `<div class="tl-step">
          <div class="tl-dot ${active ? '' : 'inactive'}"></div>
          <span class="tl-label ${active ? 'active' : ''}">${step}</span>
        </div>`;
      });
      return html;
    }

    function orderPlaceholderSVG() {
      return `<svg class="img-placeholder" width="52" height="52" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <rect x="6" y="8" width="24" height="20" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="13" cy="16" r="3" stroke="currentColor" stroke-width="1.2"/>
        <path d="M6 26L12 20L16 24L22 17L30 26" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>`;
    }

    /* ── render ── */
    function renderOrders() {
      const orders = getOrders();
      const list = document.getElementById('ordersList');

      if (!orders.length) {
        list.innerHTML = `<div class="orders-empty">
          <p>You haven't placed any orders yet.</p>
          <a href="products.html">Start shopping →</a>
        </div>`;
        return;
      }

      list.innerHTML = orders.slice().reverse().map(order => {
        const bc = badgeClass(order.status);
        const bl = badgeLabel(order.status);

        const itemsHTML = (order.items || []).map(item => {
          const safeItem = JSON.stringify(item).replace(/"/g, '&quot;');
          const imgEl = item.image
            ? `<img src="${item.image}" alt="${item.name || ''}"
                 onerror="this.parentElement.innerHTML = window.orderPlaceholderSVG()">`
            : orderPlaceholderSVG();
          return `
            <div class="order-item">
              <div class="order-item-img"><div class="order-item-media">${imgEl}</div></div>
              <div class="order-item-body">
                <div class="order-item-name">${item.name || 'Unknown Product'}</div>
                <div class="order-item-meta">
                  <span class="meta-qty">Qty: <strong>${item.qty}</strong></span>
                  <span class="meta-dot-sep"></span>
                  <span class="delivery-pill">${item.deliveryName || order.delivery || 'Standard Delivery'}</span>
                  ${item.price ? `<span class="meta-dot-sep"></span><span class="meta-total">Total: <strong>${fmt(item.price * item.qty)}</strong></span>` : ''}
                </div>
                <div class="order-item-actions">
                  <button class="btn-cart" onclick='addToCart(${safeItem})'>Add to Cart</button>
                  <button class="btn-buy"  onclick='buyNow(${safeItem})'>Buy Again</button>
                </div>
              </div>
            </div>`;
        }).join('');

        return `
          <div class="order-card">
            <div class="order-card-header">
              <div class="header-left">
                <div class="booking-number">${order.orderId || ''}</div>
                <div class="delivery-date">Delivery date: <em>${order.estimatedArrival || '—'}</em></div>
                <button class="track-btn" onclick="showToast('Tracking feature coming soon.')">
                  <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                    <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.3"/>
                    <path d="M7 4.5V7.5L9 9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                  </svg>
                  Track Order
                </button>
              </div>
              <div class="header-right">
                <span class="status-label">Order Status</span>
                <div class="status-badge ${bc}">
                  <span class="status-dot"></span>${bl}
                </div>
                <div class="status-timeline">${timelineHTML(order.status)}</div>
              </div>
            </div>

            <div class="order-items">${itemsHTML}</div>

            <div class="order-card-footer">
              <div class="footer-left">
                <div class="footer-delivery-info">🚚 ${order.delivery || 'Standard Delivery'} &nbsp;·&nbsp; Shipping: ${fmt(order.shippingFee)}</div>
                <div class="footer-sep"></div>
                <div class="footer-total">Total: <span>${fmt(order.grandTotal)}</span></div>
              </div>
            </div>
            <div class="ornament">— ✦ —</div>
          </div>`;
      }).join('');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    window.addToCart = function(item) {
      try {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const existing = cart.find(c => c.id === item.id);
        if (existing) existing.qty += item.qty || 1;
        else cart.push({ ...item, qty: item.qty || 1 });
        localStorage.setItem('cart', JSON.stringify(cart));
        showToast('Added to cart!');
      } catch { showToast('Could not add to cart.'); }
    };

    window.buyNow = function(item) {
      sessionStorage.setItem('checkoutItems', JSON.stringify([{ ...item, qty: item.qty || 1 }]));
      window.location.href = 'checkout.html';
    };

    window.orderPlaceholderSVG = orderPlaceholderSVG;

    document.addEventListener('DOMContentLoaded', () => {
      const justOrdered = sessionStorage.getItem('justOrdered');
      if (justOrdered) sessionStorage.removeItem('justOrdered');
      renderOrders();
      if (justOrdered) showToast('Order placed successfully! ✦');
    });
  </script>
</body>
</html>
